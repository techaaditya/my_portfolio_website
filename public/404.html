<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Off the chart — Aaditya Sapkota</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #050112;
        color: #f1edfd;
        font-family: 'Geist Sans', ui-sans-serif, system-ui, sans-serif;
        background-image:
          radial-gradient(60vmax 60vmax at 15% 10%, rgba(124, 58, 237, 0.22), transparent 60%),
          radial-gradient(50vmax 50vmax at 85% 85%, rgba(34, 211, 238, 0.12), transparent 60%);
        text-align: center;
        padding: 2rem;
      }
      .readout {
        font-family: ui-monospace, 'SFMono-Regular', monospace;
        font-size: 0.72rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #a49bce;
      }
      h1 {
        font-family: ui-serif, Georgia, 'Times New Roman', serif;
        font-size: clamp(3rem, 12vw, 7rem);
        font-weight: 400;
        line-height: 1;
        margin: 0.5rem 0 1rem;
        background: linear-gradient(120deg, #a78bfa, #22d3ee 45%, #e879f9 90%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: #a49bce;
        max-width: 32rem;
        margin: 0 auto 2rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: 1px solid rgba(167, 139, 250, 0.4);
        background: rgba(167, 139, 250, 0.1);
        color: #f1edfd;
        text-decoration: none;
        padding: 0.65rem 1.25rem;
        border-radius: 999px;
        font-size: 0.9rem;
        transition: border-color 0.2s;
      }
      a:hover {
        border-color: #a78bfa;
      }
    </style>
  </head>
  <body>
    <div>
      <p class="readout">Error 404 · off the chart</p>
      <h1>Lost in space</h1>
      <p>That coordinate isn't plotted. The page you're looking for doesn't exist.</p>
      <a href="/">← Back to the constellation</a>
    </div>
  </body>
</html>
